name: Sync to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v6

      - name: Prepare Web Content
        run: |
          mkdir web_deploy
          
          cp _config.yml web_deploy/
          cp robots.txt web_deploy/
          cp README.md web_deploy/index.md
          cp -r assets web_deploy/
          
          REPO_RAW_URL="https://raw.githubusercontent.com/tugamer89/tugamer89/main"
          
          sed -i "s|src=\"images/|src=\"$REPO_RAW_URL/images/|g" web_deploy/index.md
          sed -i "s|src=\"dist/|src=\"$REPO_RAW_URL/dist/|g" web_deploy/index.md
          sed -i "s|src=\"profile-3d-contrib/|src=\"$REPO_RAW_URL/profile-3d-contrib/|g" web_deploy/index.md

      - name: Push to Target Repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.SYNC_PAT }}
        with:
          source-directory: 'web_deploy'
          destination-github-username: 'tugamer89'
          destination-repository-name: 'tugamer89.github.io'
          user-email: '41898282+github-actions[bot]@users.noreply.github.com'
          target-branch: main